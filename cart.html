<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | CricStars Official</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cart-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 40px;
            margin-top: 20px;
        }
        .cart-items {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .cart-summary {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            height: fit-content;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        .total-row {
            font-size: 1.3rem;
            font-weight: bold;
            color: #0b6623;
            border-top: 2px solid #eee;
            padding-top: 15px;
            margin-top: 15px;
        }
        @media (max-width: 900px) {
            .cart-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <noscript> Apologies! Your does not support scripts. Kindly, enable JavaScript to proceed </noscript>
    <header>
        <h1 class="branding" style="font-family: Georgia, 'Times New Roman', Times, serif;">CRICSTARS</h1>
        <p class="sub-branding"><i>Premium Cricket Equipment</i></p>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html" class="active">Cart</a>
        <a href="auth.html">Log In/ Sign Up</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About</a>
    </nav>
    <div class="container animate-pop">
        <h2 style="margin-bottom: 20px;" class="text-gradient">Shopping Cart</h2>
        <div class="cart-container">
            <div class="cart-items" id="cartItems">
            </div>
            <div class="cart-summary">
                <h3 style="margin-bottom: 20px; border-bottom: 2px solid #0b6623; padding-bottom: 10px; display: inline-block;">Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">₹0</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span style="color: #22c55e;">Free</span>
                </div>
                <div class="summary-row total-row">
                    <span>Total</span>
                    <span id="total">₹0</span>
                </div>
                <button class="btn" style="width: 100%; margin-top: 20px; padding: 15px;" onclick="alert('Proceeding to checkout...')">Proceed to Checkout</button>
            </div>
        </div>
    </div>
    <footer>
        <div class="container">
            <p style="font-size: 1.2rem; font-weight: bold; margin-bottom: 10px;" class="text-gradient">CRICSTARS SPORTS INDIA</p>
            <p>&copy; 2026 CricStars. All Rights Reserved.</p>
        </div>
    </footer>
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
